schema_version: 1

context:
  name: bambi
  version: 0.18.0
  python_min: '3.12'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/bambi-${{ version }}.tar.gz
  sha256: 2dea9a49c15e7b78f380a662d58bd27ff434da3933119609ee6a0ec3a9955f1c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - formulae >=0.6.0,<0.7.0
    - python-graphviz
    - pandas >=1.0.0
    - pymc >=6.0.0,<7.0.0
    - matplotlib-base >=3.9.0
    - sparse >=0.17.0,<0.18
    - arviz-plots >=1.0.0,<2.0.0
    - pytensor >=3.0.0,<4.0.0
    - seaborn >=0.13.2,<0.14
tests:
  - python:
      imports:
        - bambi
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - 3.*

about:
  summary: BAyesian Model Building Interface in Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/bambinos/bambi

extra:
  recipe-maintainers:
    - ocefpaf
